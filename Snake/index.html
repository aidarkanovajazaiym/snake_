<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Snake</title>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 20px;
        }

        #menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            background: #0022ff;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="ui">Очки: 0</div>

    <div id="menu">
        <h1 style="color:white;"></h1>
        <button onclick="startGame()">START</button>
    </div>

    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        canvas.width = innerWidth;
        canvas.height = innerHeight;

        let state = "menu";

        let snake, bots, food, score;
        let mouse = { x: 0, y: 0 };

        document.addEventListener("mousemove", e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        function startGame() {
            state = "play";
            document.getElementById("menu").style.display = "none";

            snake = [{ x: 300, y: 300 }];
            bots = [];
            food = [];
            score = 0;

            for (let i = 0; i < 5; i++) bots.push(createBot());
            spawnFood(120);
        }

        function gameOver() {
            state = "menu";
            document.getElementById("menu").style.display = "block";
            document.getElementById("menu").innerHTML =
                `<h1 style="color:white;">💀 Game Over<br>Очки: ${score}</h1>
         <button onclick="startGame()">RESTART</button>`;
        }

        function createBot() {
            let body = [];
            let x = Math.random() * canvas.width;
            let y = Math.random() * canvas.height;

            for (let i = 0; i < 10; i++) {
                body.push({ x: x - i * 5, y: y });
            }

            return { body };
        }

        function spawnFood(n) {
            for (let i = 0; i < n; i++) {
                food.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    color: `hsl(${Math.random() * 360},100%,60%)`
                });
            }
        }

        function explode(body) {
            for (let p of body) {
                food.push({
                    x: p.x,
                    y: p.y,
                    color: `hsl(${Math.random() * 360},100%,60%)`
                });
            }
        }

        function size(i) {
            return Math.min(8, 5 + i * 0.2);
        }

        function movePlayer() {
            let head = snake[0];

            let dx = mouse.x - canvas.width / 2;
            let dy = mouse.y - canvas.height / 2;
            let dist = Math.hypot(dx, dy) || 1;

            let vx = dx / dist * 3;
            let vy = dy / dist * 3;

            let newHead = { x: head.x + vx, y: head.y + vy };
            snake.unshift(newHead);
            return newHead;
        }

        function moveBot(bot) {
            let head = bot.body[0];

            let target = food[0];
            let min = Infinity;

            for (let f of food) {
                let d = Math.hypot(f.x - head.x, f.y - head.y);
                if (d < min) {
                    min = d;
                    target = f;
                }
            }

            let dx = target.x - head.x;
            let dy = target.y - head.y;
            let dist = Math.hypot(dx, dy) || 1;

            let vx = dx / dist * 2;
            let vy = dy / dist * 2;

            let newHead = { x: head.x + vx, y: head.y + vy };
            bot.body.unshift(newHead);

            return newHead;
        }

        function update() {

            if (state !== "play") return;

            let head = movePlayer();

            let ate = false;
            for (let i = food.length - 1; i >= 0; i--) {
                if (Math.hypot(food[i].x - head.x, food[i].y - head.y) < 10) {
                    score++;
                    document.getElementById("ui").innerText = "Очки: " + score;
                    food.splice(i, 1);
                    ate = true;
                    break;
                }
            }

            if (!ate) snake.pop();

            for (let bot of bots) {

                let newHead = moveBot(bot);

                let botAte = false;
                for (let i = food.length - 1; i >= 0; i--) {
                    if (Math.hypot(food[i].x - newHead.x, food[i].y - newHead.y) < 10) {
                        food.splice(i, 1);
                        botAte = true;
                        break;
                    }
                }

                if (!botAte) bot.body.pop();

                for (let part of bot.body) {
                    if (Math.hypot(part.x - head.x, part.y - head.y) < 10) {
                        explode(snake);
                        gameOver();
                    }
                }


                for (let part of snake) {
                    if (Math.hypot(part.x - newHead.x, part.y - newHead.y) < 10) {
                        explode(bot.body);
                        bot.body = createBot().body;
                    }
                }
            }

            if (food.length < 100) {
                spawnFood(20);
            }
        }

        function draw() {

            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (state !== "play") return;

            let head = snake[0];
            let offsetX = canvas.width / 2 - head.x;
            let offsetY = canvas.height / 2 - head.y;


            for (let f of food) {
                ctx.fillStyle = f.color;
                ctx.beginPath();
                ctx.arc(f.x + offsetX, f.y + offsetY, 5, 0, Math.PI * 2);
                ctx.fill();
            }

            for (let bot of bots) {
                for (let i = bot.body.length - 1; i >= 0; i--) {
                    let s = bot.body[i];

                    ctx.fillStyle = "#ff3333";
                    ctx.beginPath();
                    ctx.arc(s.x + offsetX, s.y + offsetY, size(i), 0, Math.PI * 2);
                    ctx.fill();
                }

                let h = bot.body[0];

                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(h.x + offsetX + 3, h.y + offsetY - 2, 2, 0, Math.PI * 2);
                ctx.fill();

                ctx.beginPath();
                ctx.arc(h.x + offsetX + 3, h.y + offsetY + 2, 2, 0, Math.PI * 2);
                ctx.fill();
            }

            for (let i = snake.length - 1; i >= 0; i--) {
                let s = snake[i];

                ctx.fillStyle = "#3399ff";
                ctx.beginPath();
                ctx.arc(s.x + offsetX, s.y + offsetY, size(i), 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(canvas.width / 2 + 3, canvas.height / 2 - 2, 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(canvas.width / 2 + 3, canvas.height / 2 + 2, 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>

</body>

</html>
